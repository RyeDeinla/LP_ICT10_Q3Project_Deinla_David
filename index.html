<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intramurals Team Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body{
            background-image: url();
            background-size:cover;   
        }


            .green_hornets{
            position:absolute;
            top:400px;
            left:37px;}

            .red_bulldogs{
            position:absolute;
            top:90px;
            left:50px;
            }

            .yellow_tigers{
            position:absolute;
            top:110px;
            right:10px;}

            .blue_bears{
            position:absolute;
            top:410px;
            right:30px;}

       
        .middle-box {
            border: 2px solid #000;
            border-radius: 12px;
            padding: 40px 20px;      
            background-color: #feeebb;
            text-align: center;
            max-width: 600px;        
            margin: 0 auto;          
        }

    </style>
</head>
<body>

    <nav class="navbar navbar-expand-sm bg-primary navbar-dark fixed-top">
       <!--Brand/Logo-->
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><img src="OBMC_LOGO.jfif" alt="logo" width="50 px"height="50 px" class="rounded-circle"></a>
            <!--Add Links-->
            <div class="collapse navbar-collapse">

                <!--me-auto adjust pushes the search bar to the right-->
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index2.html" style="color:azure">SIGN UP</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html" style="color:azure">TEAM CHECKER</a></li>
                    <li class="nav-item"><a class="nav-link" href="index3.html" style="color:azure">LIST OF PLAYERS</a></li>
                </ul>
            </div>
        </div>
    </nav>
    

    <br>
    <br>
    <br>
    <br>


    <div class="container middle-box">
        <h1 style="font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">Intramurals Team Checker</h1>
        <br>
        <h5>Are you done with the online registration?</h5>
            <input type="radio" id="reg_yes" name="registration" value="yes">
            <label for="reg_yes">Yes</label>
            <input type="radio" id="reg_no" name="registration" value="no">
            <label for="reg_no">No</label>
        <br><br>
        <h5>Do you have the medical clearance from the clinic?</h5>
            <input type="radio" id="clear_yes" name="clearance" value="yes">
            <label for="clear_yes">Yes</label>
            <input type="radio" id="clear_no" name="clearance" value="no">
            <label for="clear_no">No</label>
        <br><br>
        <h5>What is your Grade & Section?</h5>
            <select id="grade" name="grade!">
            <option value="seven">7</option>
            <option value="eight">8</option>
            <option value="nine">9</option>
            <option value="ten">10</option>
            </select>

            <select id="section" name="section!">
            <option value="eme">Emerald</option>
            <option value="ruby">Ruby</option>
            <option value="sapph">Sapphire</option>
            <option value="top">Topaz</option>
            </select>
        <br><br>
        <button py-click="eligibility_computation" type="button" class="btn btn-success"> Sign Up </button>
        <br><br>
        <span id="result" style="font-weight: bold; font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;"></span></p>
        <img src="green hornets.jpg" class="green_hornets" alt="team" width="250px" height="300px">
        <img src="red bulldogs.jpg" class="red_bulldogs" alt="team" width="235px" height="315px">
        <img src="blue bears.jpg" class="blue_bears" alt="team" width="250px" height="250px">
        <img src="yellow tigers.jpg" class="yellow_tigers" alt="team" width="290px" height="300px">

        <py-script src="main.py"></py-script>

    </div>
</body>
</html>
